<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prism</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Prism</p>
        <h1>三窗口同步发送</h1>
        <p class="hint">先打开并平铺三个平台，再输入一条消息同时发送。</p>
      </header>

      <section class="panel">
        <textarea
          id="message"
          placeholder="输入要同时发送给 ChatGPT / Gemini / Claude 的内容"
        ></textarea>
        <div class="actions">
          <button id="openWindows" class="secondary">打开并平铺</button>
          <button id="sendAll" class="primary">同时发送</button>
        </div>
        <pre id="status" class="status">等待操作</pre>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
